    <script>
        var lifeData = {
            '1': {
                title: '深入理解 Agent 架构：ReAct 与 Tool Use',
                date: '2026-02-28',
                tags: ['技术学习', 'agent', 'react', 'llm', 'tool-use'],
                tagType: 'tag-learning',
                content: '<p>最近在研究 Agent 框架，特别是 ReAct（Reasoning + Acting）范式。通过让模型先思考再行动，最后观察结果，形成了一个完整的推理闭环。结合 Tool Use 能力，Agent 可以真正成为我们的智能助手。</p><h4>ReAct 的核心思想</h4><p>ReAct 的灵感来源于人类的问题解决过程：我们会先思考（Reason），然后采取行动（Act），根据结果调整策略，再思考，再行动。模型通过这种循环，可以处理复杂的任务。</p><pre><code>Thought: 需要先搜索相关信息\nAction: search[query]\nObservation: 返回了搜索结果\nThought: 根据搜索结果，我可以...</code></pre><h4>Tool Use 的实践</h4><p>在实现 Agent 时，如何设计 Tool 的接口非常重要。每个 Tool 需要有清晰的描述（description），让模型能够理解何时应该调用它。</p><h4>经验总结</h4><p>Agent 系统最大的挑战是容错和长期规划。需要考虑：如果某一步失败了怎么办？如果任务需要很多步，如何避免错误累积？</p>'
            },
            '2': {
                title: '武汉赏樱：技术与自然的对话',
                date: '2026-02-22',
                tags: ['旅行', 'travel', 'kyoto', 'spring'],
                tagType: 'tag-travel',
                content: '<p>春天的武汉，樱花盛开。走在哲学之道上，思考着 RAG 系统的设计。也许人类的记忆就像这满树的樱花，美好却又短暂，需要不断回顾和检索。技术与自然，有时异曲同工。</p><h4>哲学之道</h4><p>东湖散步道，两旁种满了樱花树。春天时，河道两岸的樱花形成一条粉色的隧道。这是最经典的赏樱路线之一。</p><h4>技术与自然的类比</h4><p>看着樱花，我想到我们的 RAG 系统：</p><ul><li>樱花的盛开需要合适的温度（就像检索需要合适的 embedding）</li><li>花瓣飘落是自然的采样（就像我们从数据库中采样）</li><li>每一朵樱花都是独特的（就像每个 chunk 都有自己的语义）</li></ul><h4>旅行的意义</h4><p>偶尔离开代码和文档，出去走走，往往能获得新的灵感。有时候，解决问题的方法不在屏幕上，而在路上。</p>'
            },
            '3': {
                title: 'RAG 系统实战：如何构建企业级知识库',
                date: '2026-02-18',
                tags: ['技术学习', 'rag', 'retrieval', 'vector-database'],
                tagType: 'tag-learning',
                content: '<p>从零构建了一个企业级 RAG 系统，涉及文档解析、chunk 策略优化、向量检索、reranking 等多个环节。踩了不少坑，终于把召回率从 60% 提升到了 85% 以上。记录一下关键的技术要点。</p><h4>文档解析</h4><p>企业文档往往是 PDF、Word 等格式。如何准确地提取文本、保留结构信息是一个挑战。我们最终使用了 PDF.js + 表格识别模型的方案。</p><h4>Chunk 策略</h4><p>不是简单的固定长度切分。根据文档类型选择不同的策略：</p><ul><li>技术文档：按代码块或标题分段</li><li>表格数据：保持表格结构</li><li>长文章：重叠窗口</li></ul><h4>检索优化</h4><p>向量检索 + 关键词检索的混合方案，加上 Cross-Encoder reranking，效果显著提升。</p><h4>血的教训</h4><p>不要忽视数据质量。Garbage in, garbage out。在做一切之前，先做好数据清洗和去重。</p>'
            },
            '4': {
                title: '从 CRUD 到 AI：一名后端开发者的转型感悟',
                date: '2026-02-12',
                tags: ['心得', 'thoughts', 'career', 'ai-engineer'],
                tagType: 'tag-thought',
                content: '<p>做后端开发五年，从 Java 到 Go，从关系数据库到分布式系统。去年开始学习 AI 相关技术，现在做 Agent 开发。最大的感悟是：编程的范式在变，但工程思维不变。学会提问比学会答案更重要。</p><h4>技术转型</h4><p>转型的过程并不容易。需要重新学习概率统计、机器学习基础、Prompt 工程等。但后端开发的经验帮了大：如何设计 API、如何处理并发、如何保证系统稳定性。</p><h4>Prompt 是新时代的 API</h4><p>以前我以为编程就是写代码。现在我发现，写好 Prompt 也是一种编程。Prompt 就是我们给模型的 API，如何设计参数（提示词），如何处理返回值（生成内容），都需要精心设计。</p><h4>心态变化</h4><p>做 CRUD 时，我很确定自己在做什么。但做 AI 后，很多事情变得不确定：模型会输出什么？效果如何评估？这需要一种新的心态：接受不确定性，在不确定中寻找规律。</p><h4>建议</h4><p>如果你也想转型，不要急着学所有的模型和框架。先从一个小的项目开始，感受 AI 开发与传统软件开发的区别。</p>'
            },
            '5': {
                title: '冰岛自驾：追逐极光的 IT 之旅',
                date: '2026-02-05',
                tags: ['旅行', 'travel', 'iceland', 'aurora'],
                tagType: 'tag-travel',
                content: '<p>冰岛自驾环岛，追逐极光。开着车在冰原上飞驰，思考着系统的可扩展性。就像这无边无际的冰原，我们的系统也需要能够弹性伸缩。追极光需要等待，就像优化模型需要耐心。科技与自然，都是关于平衡的艺术。</p><h4>环岛自驾</h4><p>冰岛的 Ring Road 全长约 1300 公里，我们用了一周时间完成环岛。一路上，瀑布、冰川、火山、黑沙滩，风景变幻莫测。</p><h4>极光的等待</h4><p>连续三晚熬夜追极光。前两晚都无功而返，第三晚终于在 Vik 附近看到了极光爆发。绿色的光带在天空中舞动，那一刻觉得所有的等待都值得。</p><h4>技术感悟</h4><ul><li><strong>可扩展性</strong>：冰岛的地热发电站可以根据需求调节功率，就像云原生架构的弹性伸缩</li><li><strong>容错</strong>：冰岛的紧急救援系统覆盖全岛，就像分布式系统的故障转移</li><li><strong>缓存</strong>：蓝湖温泉的水是循环加热的，就像 Redis 缓存复用计算结果</li></ul><h4>后记</h4><p>旅行是最好的解压方式。远离代码和会议，在大自然中重新充电。回来后，感觉思路清晰了很多。</p>'
            },
            '6': {
                title: '探索 MCP：让 AI 与世界交互',
                date: '2026-01-28',
                tags: ['技术学习', 'mcp', 'anthropic', 'agent-protocol'],
                tagType: 'tag-learning',
                content: '<p>最近在学习 Model Context Protocol（MCP），这是 Anthropic 推出的 AI 与外部世界交互的标准协议。通过 MCP，Agent 可以安全地调用外部工具、访问文件系统、操作数据库。这可能是 AI Agent 生态的重要基础设施。</p><h4>什么是 MCP</h4><p>MCP 是一个标准化协议，定义了 AI 模型如何与外部系统交互。它的设计类似于 JSON-RPC，但更专注于 AI 场景。</p><h4>核心概念</h4><ul><li><strong>Resource</strong>：AI 可以访问的数据源</li><li><strong>Tool</strong>：AI 可以调用的函数</li><li><strong>Prompt Template</strong>：可复用的提示词模板</li></ul><h4>实践体验</h4><p>用 MCP 连接了本地文件系统，Agent 现在可以直接读取我的代码仓库、搜索文件内容。这让开发效率提升了不少。</p><h4>展望</h4><p>如果 MCP 能够普及，未来的 AI Agent 生态系统会更加丰富。不同的 Agent 可以通过标准协议互操作，这将是很有意思的发展方向。</p>'
            }
        };

        function getQueryParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function loadDetail() {
            var id = getQueryParam('id');
            var content = document.getElementById('detail-content');

            // If no ID, show all articles list
            if (!id) {
                var allArticlesHtml = '<div class="all-articles"><h2>所有文章</h2><ul>';
                for (var key in lifeData) {
                    if (lifeData.hasOwnProperty(key)) {
                        var item = lifeData[key];
                        allArticlesHtml += '<li><a href="./life-detail.html?id=' + key + '">' + item.date + ' - ' + item.title + '</a></li>';
                    }
                }
                allArticlesHtml += '</ul></div>';
                content.innerHTML = allArticlesHtml;
                return;
            }

            if (!lifeData[id]) {
                content.innerHTML = '<div class="detail-error"><p>文章不存在或已被删除</p><a href="./life.html" class="back-link"><span class="back-arrow">←</span><span>返回生活点滴</span></a></div>';
                return;
            }

            var data = lifeData[id];
            var tagsHtml = '';
            for (var i = 0; i < data.tags.length; i++) {
                tagsHtml += '<a href="./life.html?tag=' + encodeURIComponent(data.tags[i]) + '" class="timeline-tag ' + data.tagType + '">#' + data.tags[i] + '</a>';
            }

            var articleHtml = '<article class="detail-article"><header class="detail-header"><div class="detail-meta"><span class="detail-date">' + data.date + '</span><div class="detail-tags">' + tagsHtml + '</div></div><h1 class="detail-title">' + data.title + '</h1></header><div class="detail-body">' + data.content + '</div><div class="detail-ascii"><pre>   ┌─────────────────────────────────────┐\n   │  EOF - End of File                  │\n   └─────────────────────────────────────┘</pre></div></article>';

            content.innerHTML = articleHtml;
        }

        // Execute immediately
        loadDetail();
    </script>
